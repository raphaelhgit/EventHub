name: EventHub CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build back & front
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            back/package-lock.json
            front/package-lock.json

      - name: Build backend
        working-directory: back
        run: |
          npm ci --include=dev
          npm run build

      - name: Build frontend
        working-directory: front
        run: |
          npm ci --include=dev
          npm run build

  deploy:
    name: Deploy to production
    needs: build
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy on server
        run: bash /var/www/eventhub/scripts/deploy.sh

      - name: Smoke test
        run: curl -fsS https://itzthomthom.fr/api/health | grep -q '"status":"ok"'
