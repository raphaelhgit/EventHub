server {
    server_name itzthomthom.fr www.itzthomthom.fr;

    root /var/www/eventhub/front/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/(auth|events|tickets|health|test-db) {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/itzthomthom.fr/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/itzthomthom.fr/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = itzthomthom.fr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name itzthomthom.fr www.itzthomthom.fr;
    return 404; # managed by Certbot
